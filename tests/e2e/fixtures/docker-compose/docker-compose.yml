# Pinned Infrahub docker-compose for e2e testing
# Based on the production docker-compose from infrahub.opsmill.io
# yamllint disable rule:line-length
---
x-infrahub-config: &infrahub_config
  INFRAHUB_BROKER_ADDRESS: message-queue
  INFRAHUB_BROKER_DRIVER: rabbitmq
  INFRAHUB_BROKER_NAMESPACE: infrahub
  INFRAHUB_BROKER_PASSWORD: infrahub
  INFRAHUB_BROKER_USERNAME: infrahub
  INFRAHUB_CACHE_ADDRESS: cache
  INFRAHUB_CACHE_DRIVER: redis
  INFRAHUB_DB_ADDRESS: database
  INFRAHUB_DB_PASSWORD: admin
  INFRAHUB_DB_PORT: 7687
  INFRAHUB_DB_PROTOCOL: bolt
  INFRAHUB_DB_TYPE: neo4j
  INFRAHUB_DB_USERNAME: neo4j
  INFRAHUB_INITIAL_DEFAULT_BRANCH: main

services:
  message-queue:
    image: rabbitmq:4.2.1-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: infrahub
      RABBITMQ_DEFAULT_PASS: infrahub
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 3s

  cache:
    image: redis:8.4.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 3

  database:
    image: neo4j:2025.10.1-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/admin
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_auth__minimum__password__length: 4
    volumes:
      - "database_data:/data"
      - "database_logs:/logs"
    healthcheck:
      test: wget -O /dev/null http://localhost:7474 || exit 1
      interval: 2s
      timeout: 10s
      retries: 20
      start_period: 3s

  task-manager:
    image: registry.opsmill.io/opsmill/infrahub:1.8.2
    command: uvicorn --host 0.0.0.0 --port 4200 --factory infrahub.prefect_server.app:create_infrahub_prefect
    restart: unless-stopped
    depends_on:
      task-manager-db:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres:postgres@task-manager-db:5432/prefect
    healthcheck:
      test: curl -s -f -o /dev/null http://localhost:4200/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  task-manager-db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prefect
    volumes:
      - workflow_db:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d prefect -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  infrahub-server:
    image: registry.opsmill.io/opsmill/infrahub:1.8.2
    restart: unless-stopped
    command: >
      gunicorn --config backend/infrahub/serve/gunicorn_config.py
      -w 2
      --logger-class infrahub.serve.log.GunicornLogger
      infrahub.server:app
    depends_on:
      database:
        condition: service_healthy
      message-queue:
        condition: service_healthy
      cache:
        condition: service_healthy
      task-manager:
        condition: service_healthy
    environment:
      <<: *infrahub_config
      INFRAHUB_PRODUCTION: "false"
      INFRAHUB_LOG_LEVEL: INFO
      INFRAHUB_ALLOW_ANONYMOUS_ACCESS: "true"
      INFRAHUB_INITIAL_ADMIN_TOKEN: "06438eb2-8019-4776-878c-0941b1f1d1ec"
      INFRAHUB_INITIAL_AGENT_TOKEN: "44af444d-3b26-410d-9546-b758657e026c"
      INFRAHUB_SECURITY_SECRET_KEY: "327f747f-efac-42be-9e73-999f08f86b92"
      INFRAHUB_WORKFLOW_ADDRESS: task-manager
      INFRAHUB_WORKFLOW_PORT: 4200
      PREFECT_API_URL: http://task-manager:4200/api
    ports:
      - "8000:8000"
    volumes:
      - "storage_data:/opt/infrahub/storage"
      - "workflow_data:/opt/infrahub/workflow"
    tty: true
    healthcheck:
      test: curl -s -f -o /dev/null http://localhost:8000/api/config || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  task-worker:
    image: registry.opsmill.io/opsmill/infrahub:1.8.2
    command: prefect worker start --type infrahubasync --pool infrahub-worker --with-healthcheck
    restart: unless-stopped
    depends_on:
      - infrahub-server
    environment:
      <<: *infrahub_config
      INFRAHUB_PRODUCTION: "false"
      INFRAHUB_LOG_LEVEL: DEBUG
      INFRAHUB_API_TOKEN: "44af444d-3b26-410d-9546-b758657e026c"
      INFRAHUB_SECURITY_SECRET_KEY: "327f747f-efac-42be-9e73-999f08f86b92"
      INFRAHUB_ADDRESS: http://infrahub-server:8000
      INFRAHUB_INTERNAL_ADDRESS: http://infrahub-server:8000
      INFRAHUB_WORKFLOW_ADDRESS: task-manager
      INFRAHUB_TIMEOUT: "60"
      INFRAHUB_WORKFLOW_PORT: 4200
      PREFECT_API_URL: http://task-manager:4200/api
    tty: true

volumes:
  database_data:
  database_logs:
  storage_data:
  workflow_db:
  workflow_data:
