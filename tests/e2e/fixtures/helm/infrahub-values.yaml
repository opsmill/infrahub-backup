# Minimal Infrahub Helm values for e2e testing in vcluster
global:
  imagePullPolicy: IfNotPresent

infrahub-backup:
  enabled: false

infrahubServer:
  replicas: 1
  infrahubServer:
    livenessProbe:
      failureThreshold: 120
      initialDelaySeconds: 1
      periodSeconds: 1
      timeoutSeconds: 1
    readinessProbe:
      httpGet:
        path: /api/config
        port: 8000
      failureThreshold: 120
      initialDelaySeconds: 1
      periodSeconds: 1
      timeoutSeconds: 1

infrahubTaskWorker:
  replicas: 1

upgrade:
  enabled: false

infrahubDemoData:
  enabled: false

rabbitmq:
  startupProbe:
    enabled: true
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 20
  readinessProbe:
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 20
  resourcesPreset: none

redis:
  resourcesPreset: none